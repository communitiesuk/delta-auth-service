name: Terraform Deploy Latest
run-name: Terraform Deploy ${{ inputs.environment }}
on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: Environment to deploy to
        options:
          - test
          - staging
          - production

      image_tag:
        required: true
        type: string
        description: Desired image tag to be deployed (usually release-x.y)
        default: 'UNCHANGED'

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  TF_WORKING_DIRECTORY: terraform/${{ inputs.environment }}
  ENVIRONMENT: ${{ inputs.environment }}
  DEPLOYMENT_ROLE: ${{ inputs.environment == 'production' && 'arn:aws:iam::468442790030:role/terraform-prod-deployment-role' || 'arn:aws:iam::486283582667:role/terraform-test-deployment-role' }}
  DEPLOYMENT_SESSION_NAME: github-actions-${{ inputs.environment }}-terraform-deployment
  TERRAFORM_VERSION: "1.9.3"

jobs:
  plan:
    name: ${{ inputs.environment }} Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.current_tags.outputs.image_tag }}
    permissions:
      id-token: write
      pull-requests: write
      contents: read
      packages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Confirming Checked Out Branch
        run: echo "The checked out branch is ${{ github.ref_name }}"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOYMENT_ROLE }}
          role-session-name: ${{ env.DEPLOYMENT_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: fmt
        run: terraform fmt -check -diff -recursive

      - name: Terraform init
        env:
          COMMON_INFRA_DEPLOY_KEY: ${{ secrets.COMMON_INFRA_DEPLOY_KEY }}
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: init
        run: |
          mkdir -p ~/.ssh
          echo "$COMMON_INFRA_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          terraform init -no-color

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: validate
        run: terraform validate -no-color

      - name: Get current tag values
        id: current_tags
        run: |
          # Get current image tag
           if [ "${{ inputs.image_tag }}" = "UNCHANGED" ]; then
             echo "Fetching current image tag..."
             FULL_IMAGE=$(aws ecs describe-task-definition \
               --task-definition delta-auth-service-${{ inputs.environment }} \
               --query 'taskDefinition.containerDefinitions[0].image' \
               --output text)
             echo "Full image URI: ${FULL_IMAGE}"
             IMAGE_TAG=$(echo ${FULL_IMAGE} | rev | cut -d':' -f1 | rev)
             echo "Extracted image tag: ${IMAGE_TAG}"
             echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
           else
             echo "Using provided image tag: ${{ inputs.image_tag }}"
             echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
           fi
          
           echo "Final output values:"
           echo "image tag: $(cat $GITHUB_OUTPUT | grep image_tag | cut -d'=' -f2)"  

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan \
          -var="image_tag=${{ steps.current_tags.outputs.image_tag }}"

      - name: Terraform show
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: show
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Save Terraform Plan
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIRECTORY }}/tfplan
            ${{ env.TF_WORKING_DIRECTORY }}/tfplan.txt
          retention-days: 5

      - name: Post Plan Summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          {
            echo "### Terraform Plan Summary"
            echo "**Environment**: \`${{ env.ENVIRONMENT }}\`"
            echo "**Branch**: \`${{ github.ref_name }}\`"
            echo "**Triggered By**: \`${{ github.actor }}\`"
            echo "**Image Tags**:"
            echo "* image_tag: \`${{ steps.current_tags.outputs.image_tag }}\`"
            echo "### Plan Details"
            echo "\`\`\`hcl"
            cat tfplan.txt || echo "Failed to read plan file"
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY

  apply:
    name: ${{ inputs.environment }} Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: plan
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOYMENT_ROLE }}
          role-session-name: ${{ env.DEPLOYMENT_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        env:
          COMMON_INFRA_DEPLOY_KEY: ${{ secrets.COMMON_INFRA_DEPLOY_KEY }}
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: init
        run: |
          mkdir -p ~/.ssh
          echo "$COMMON_INFRA_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          terraform init -no-color

      - name: Download Terraform Plan
        uses: actions/download-artifact@v7
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIRECTORY }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        id: apply
        run: |
          terraform apply -auto-approve tfplan 2>&1 | tee apply_output.txt

      - name: Post Apply Summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          {
            echo "### Terraform Apply Summary"
            echo "**Environment**: \`${{ env.ENVIRONMENT }}\`"
            echo "**Branch**: \`${{ github.ref_name }}\`"
            echo "**Executed By**: \`${{ github.actor }}\`"
            echo "**Status**: \`${{ steps.apply.outcome }}\`"
            echo "**Image Tags Applied**:"
            echo "* image_tag: \`${{ needs.plan.outputs.image_tag }}\`"
            echo "### Apply Output"
            echo "\`\`\`"
            if [ -f apply_output.txt ]; then
             cat apply_output.txt
            else
             echo "No apply output found"
            fi
            echo "\`\`\`"
           } >> $GITHUB_STEP_SUMMARY
